<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Profile</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f0f0f0;
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    background-color: #414141;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    z-index: 1000;
}

/* CONTENT */
.content {
    height: 1500px;
    padding: 20px;
}

/* CARD */
.card {
    position: relative;
    width: 280px;
    height: 380px;
    background: white;
    border-radius: 20px;
    padding: 20px;
    margin: 50px auto;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    text-align: center;
}

/* BADGE ONLINE */
.badge {
    position: absolute;
    top: 15px;
    right: 15px;
    background: #00aa13;
    color: white;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

/* FOTO DRIVER */
.profile-img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid #3e3e3e;
    object-fit: cover;
    margin-top: 10px;
}

/* NAMA */
.card h2 {
    margin: 10px 0 5px;
}

/* RATING */
.rating {
    color: #ffa500;
    font-size: 18px;
}

/* INFO */
.info {
    margin-top: 10px;
    font-size: 14px;
    color: #555;
}

/* BUTTON */
.btn {
    margin-top: 15px;
    background: #00aa13;
    color: white;
    padding: 10px;
    border-radius: 10px;
    text-decoration: none;
    display: inline-block;
}

/* BACK TO TOP */
.top-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #00aa13;
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
    text-decoration: none;
    z-index: 999;
}
</style>

</head>

<body>

<div class="navbar">
    Driver Profile 
</div>

<div class="content">

    <div class="card">
        <div class="badge">Online 🟢</div>

        <img src="https://i.pravatar.cc/150" class="profile-img">

        <h2>Devina Aulia</h2>

        <div class="rating">⭐ 4.9</div>

        <div class="info">
            🚗 Toyota Avanza <br>
            📍 Sleman <br>
            📞 08xxxxxxxxxx
        </div>

        <a href="#" class="btn">Hubungi Driver</a>
    </div>

</div>

<a href="#" class="top-btn">↑</a>

</body>
</html>
