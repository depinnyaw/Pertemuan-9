<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: white; 
}

/* NAVBAR */
.navbar {
    background-color: #333;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}


.logo {
    color: white;
    font-size: 22px;
    font-weight: bold;
}

.menu {
    display: flex;
    list-style: none;
    gap: 20px;
}

.menu a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    transition: 0.3s;
}

.menu a:hover {
    color: #a5a7a4;
}

/* HERO */
.hero img {
    width: 100%;
    height: 400px;
    object-fit: cover;
}

.text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 50px;
    font-weight: bold;
    text-shadow: 2px 2px 5px black;
}

/* CARD SECTION */
.cards {
    display: flex;
    gap: 20px;
    padding: 20px;
}

.card {
    flex: 1;
    background: #f4f4f4;
    padding: 20px;
    text-align: center;
    border-radius: 10px;
}

/* RESPONSIVE */
/* Mobile */
@media (max-width: 480px) {
    body { background-color: rgb(139, 138, 138); }

    .menu {
        flex-direction: column;
        align-items: flex-end;
    }

    .cards {
        flex-direction: column;
    }

    .text {
        font-size: 25px;
    }

    .logo {
        font-size: 18px;
    }
}

/* Tablet */
@media (min-width: 481px) and (max-width: 768px) {
    body { background-color: rgb(98, 93, 93); }

    .menu {
        flex-direction: column;
        align-items: flex-end;
    }

    .cards {
        flex-direction: column;
    }

    .text {
        font-size: 35px;
    }
}

/* Laptop */
@media (min-width: 769px) and (max-width: 1024px) {
    body {
        background-color: rgb(178, 187, 197);
    }

    .text {
        font-size: 45px;
    }
}

/* Desktop */
@media (min-width: 1025px) {
    body {
        background-color: rgb(255, 255, 255);
    }

    .text {
        font-size: 50px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">Anjem</div>
    <ul class="menu">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Service</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<!-- HERO -->
<div class="hero" style="position:relative;">
    <img src="/Stylesheet2/hi qualitee.jpg">
    <div class="text">Jasa Anjem</div>
</div>

<!-- CONTENT / CARDS -->
<div class="cards">
    <div class="card">
        <h3>Jasa Antar Jemput</h3>
        <p></p>
    </div>
    <div class="card">
        <h3>Jasa Pindahan Kost</h3>
        <p></p>
    </div>
    <div class="card">
        <h3>Jasa Antar Barang</h3>
        <p></p>
    </div>
</div>

</body>
</html>
