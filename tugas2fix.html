<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Profile</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    background-color: #333;
    color: white;
    padding: 10px;
    text-align: center;
}

/* CONTENT */
.content {
    height: 1200px;
    padding: 20px;
}

/* CARD */
.card {
    position: relative;
    width: 280px;
    height: 340px;
    background: #f4f4f4;
    border-radius: 10px;
    padding: 15px;
    margin: 40px auto;
    text-align: center;
}

/* BADGE */
.badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: green;
    color: white;
    padding: 4px 8px;
    font-size: 12px;
    border-radius: 10px;
}

/* FOTO */
.card img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
}

/* TEXT */
.card h3 {
    margin: 10px 0 5px;
}

.card p {
    font-size: 14px;
    margin: 3px 0;
}

/* BUTTON */
.btn {
    margin-top: 10px;
    padding: 6px 10px;
    background: #333;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    display: inline-block;
}

/* BACK TO TOP */
.top-btn {
    position: fixed;
    bottom: 15px;
    right: 15px;
    background: #333;
    color: white;
    padding: 8px;
    border-radius: 5px;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="navbar">
    Profil Driver
</div>

<div class="content">

    <div class="card">
        <div class="badge">Online</div>

        <img src="https://via.placeholder.com/100" alt="driver">

        <h3>Devina</h3>
        <p>Rating: 4.8</p>
        <p>Mobil: Avanza</p>
        <p>Lokasi: Jogja</p>

        <a href="#" class="btn">Hubungi</a>
    </div>

</div>

<a href="#" class="top-btn">Top</a>

</body>
</html>
